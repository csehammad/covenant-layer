manifest_version: "1.0"
conformance_profile: "onboarding-v1"
manifest_id: "pmf_example_001"
participant_id: "provider.example.travel"
participant_type: "provider" # provider|broker|verifier|settlement_service|agent_service

issued_at: "2026-03-12T12:00:00Z"
expires_at: "2026-09-12T12:00:00Z"

identity:
  legal_name: "Example Travel Inc."
  website: "https://example.com"
  jurisdictions:
    - "US"
    - "EU"
  contacts:
    ops: "ops@example.com"
    security: "security@example.com"

keys:
  signing:
    - kid: "example-ed25519-2026-q1"
      alg: "Ed25519"
      public_key: "z6Mkgf..."
      valid_from: "2026-01-01T00:00:00Z"
      valid_to: "2026-06-30T23:59:59Z"
  rotation_policy_days: 90

capabilities:
  domains:
    - "travel.flight"
  objective_types:
    - "book_flight"
    - "hold_fare"
  constraints_supported:
    - "max_budget"
    - "cabin_class"
    - "no_overnight_layover"

provider_policy:
  fulfillment_sla_seconds: 300
  idempotency_window_seconds: 86400
  incident_response_policy_ref: "https://example.com/policies/incident-response"
  data_protection_policy_ref: "https://example.com/policies/data-protection"

commitment_policy:
  offer_ttl_seconds_default: 900
  acceptance_requires_approval_ref: true
  max_settlement_window_seconds: 86400
  refund_policy_ref: "https://example.com/policies/refunds"
  dispute_policy_ref: "https://example.com/policies/disputes"

evidence_profile:
  required_types:
    - "booking_confirmation"
    - "ticket_issued"
  integrity:
    signature_format: "dsse"
    hash_alg: "sha256"
  retention_days: 365

service_interfaces:
  offer_submission: "https://provider.example.com/covenant/offer"
  fulfillment_notice: "https://provider.example.com/covenant/fulfillment"
  evidence_submission: "https://provider.example.com/covenant/evidence"
  status_query: "https://provider.example.com/covenant/status"

registry_anchor:
  chain: "ethereum-l2"
  contract: "0x0000000000000000000000000000000000000000"
  manifest_cid: "bafy..."
  manifest_hash: "sha256:..."
  stake:
    required: false
    amount: 0
    currency: "USD"

admission_status:
  state: "requested" # requested|identity_verified|conformance_passed|probation|active|restricted|revoked
  attestation_refs: []

signature:
  mode: "detached"
  file: "provider-manifest.template.yaml.sig"
