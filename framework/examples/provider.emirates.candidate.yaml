manifest_version: "1.0"
conformance_profile: "onboarding-v1"
manifest_id: "pmf_emirates_candidate_001"
participant_id: "provider.emirates.air"
participant_type: "provider"

issued_at: "2026-03-12T12:00:00Z"
expires_at: "2026-09-12T12:00:00Z"

identity:
  legal_name: "Emirates"
  website: "https://www.emirates.com"
  jurisdictions:
    - "AE"
    - "EU"
    - "US"
  contacts:
    ops: "partner-ops@example.com"
    security: "security@example.com"

keys:
  signing:
    - kid: "emirates-ed25519-2026-q1"
      alg: "Ed25519"
      public_key: "z6Mkemirates..."
      valid_from: "2026-01-01T00:00:00Z"
      valid_to: "2026-06-30T23:59:59Z"
  rotation_policy_days: 90

capabilities:
  domains:
    - "travel.flight"
  objective_types:
    - "book_flight"
    - "hold_fare"
    - "change_booking"
  constraints_supported:
    - "max_budget"
    - "cabin_class"
    - "max_stops"
    - "no_overnight_layover"

provider_policy:
  fulfillment_sla_seconds: 300
  idempotency_window_seconds: 86400
  incident_response_policy_ref: "https://www.emirates.com/policies/incident-response"
  data_protection_policy_ref: "https://www.emirates.com/policies/data-protection"

commitment_policy:
  offer_ttl_seconds_default: 900
  acceptance_requires_approval_ref: true
  max_settlement_window_seconds: 86400
  refund_policy_ref: "https://www.emirates.com/policies/refunds"
  dispute_policy_ref: "https://www.emirates.com/policies/disputes"

evidence_profile:
  required_types:
    - "pnr_created"
    - "ticket_issued"
    - "fare_rules_snapshot"
  integrity:
    signature_format: "dsse"
    hash_alg: "sha256"
  retention_days: 365

service_interfaces:
  offer_submission: "https://provider.emirates.example/covenant/offer"
  fulfillment_notice: "https://provider.emirates.example/covenant/fulfillment"
  evidence_submission: "https://provider.emirates.example/covenant/evidence"
  status_query: "https://provider.emirates.example/covenant/status"

registry_anchor:
  chain: "ethereum-l2"
  contract: "0x0000000000000000000000000000000000000000"
  manifest_cid: "bafybeiemiratescandidate"
  manifest_hash: "sha256:placeholder"
  stake:
    required: false
    amount: 0
    currency: "USD"

admission_status:
  state: "requested"
  attestation_refs: []

signature:
  mode: "detached"
  file: "provider.emirates.candidate.yaml.sig"

signing_workflow_notes:
  - "Run: cargo run -- sign --manifest examples/provider.emirates.candidate.yaml"
  - "Run: cargo run -- verify-signature --manifest examples/provider.emirates.candidate.yaml"
